{% extends 'events/base.html' %}

{% block content %}
	<h1>Search</h1>
	{% if searched %}
		<h1>You searched for :{{ searched }}</h1>
		{% for venue in venues %}
			<a href="{% url 'events:show-venue' venue.pk %}">{{ venue }}</a>
		{% endfor %}

	{% else %}
		<h1>Hey! You forgot to search for a venue</h1>
	{% endif %}
{% endblock %}
